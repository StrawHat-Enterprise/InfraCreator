name: GitHub Access Request
description: Request GitHub Enterprise, Organization, or Repository access
title: "[GitHub Access Request]: "
labels:
  - "access-request"

body:
  - type: dropdown
    id: request_type
    attributes:
      label: Request Type
      description: Select the type of request
      options:
        - "New Access"
        - "Modify Access"
        - "Remove Access"
        - "Emergency Access"
    validations:
      required: true

  - type: input
    id: requested_for
    attributes:
      label: Requested For
      description: Enter the user's company email
      placeholder: user@company.com
    validations:
      required: true

  - type: textarea
    id: business_justification
    attributes:
      label: Business Justification
      description: Explain why this access is needed
      placeholder: Need access to support deployment, repository maintenance, or project delivery
    validations:
      required: true

  - type: dropdown
    id: access_scope
    attributes:
      label: Access Scope
      description: Select the type of access needed
      options:
        - "Enterprise Account Only"
        - "Organization Access"
        - "Repository Access"
        - "Organization + Repository Access"
    validations:
      required: true

  - type: dropdown
    id: organization
    attributes:
      label: GitHub Organization
      description: Select the target GitHub organization
      options:
        - "ETS"
        - "CA"
        - "CDT"
        - "Other"
    validations:
      required: true

  - type: input
    id: repository_name
    attributes:
      label: Repository Name
      description: Enter the repository name if repository access is needed
      placeholder: repo-dashboard

  - type: dropdown
    id: permission
    attributes:
      label: Permission Required
      description: Select the required permission level for the repository
      options:
        - "Read"
        - "Triage"
        - "Write"
        - "Maintain"
        - "Admin"

  - type: dropdown
    id: temporary_access
    attributes:
      label: Is this temporary access?
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: input
    id: expiry_date
    attributes:
      label: Expiry Date
      description: Provide the end date if this is temporary access
      placeholder: YYYY-MM-DD

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
      description: Add any extra context for the platform team
      placeholder: Mention project name, ticket number, environment, or urgency if needed

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: "I confirm that this request is for a valid business need."
          required: true
