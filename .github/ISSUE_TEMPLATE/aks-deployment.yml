name: AKS Infrastructure Deployment
description: Deploy AKS cluster infrastructure using IssueOps
title: "[AKS] Infrastructure Deployment Request"
labels: ["issueops", "aks", "infrastructure"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 AKS Infrastructure Deployment Request
        
        This issue enables IssueOps for deploying AKS infrastructure and bootstrapping GitOps with action runners.
        
        ### 🏗️ Infrastructure Commands
        
        | Command | Description |
        |---------|-------------|
        | `/set-aks-backend` | Initialize the Terraform backend (storage account for state files) |
        | `/build-aks-dev` | Deploy AKS infrastructure for **development** environment |
        | `/build-aks-prod` | Deploy AKS infrastructure for **production** environment |
        | `/build-aks-community` | Alias for `/build-aks-dev` |
        | `/build-aks-gh-supported` | Alias for `/build-aks-prod` |
        | `/check-aks-dev` | Check status of **development** AKS resources |
        | `/check-aks-prod` | Check status of **production** AKS resources |
        | `/destroy-aks-dev` | Destroy AKS infrastructure for **development** environment |
        | `/destroy-aks-prod` | Destroy AKS infrastructure for **production** environment |
        
        ### 🔄 GitOps & Runners Commands
        
        | Command | Description |
        |---------|-------------|
        | `/bootstrap-flux-dev` | Bootstrap Flux GitOps on **dev** cluster |
        | `/bootstrap-flux-prod` | Bootstrap Flux GitOps on **prod** cluster |
        | `/deploy-runners env=dev flavor=community types=dind` | Deploy community ARC runners on **dev** |
        | `/deploy-runners env=prod flavor=gh-supported types=dind,kubernetes-pvc,kubernetes-novolume` | Deploy GitHub-supported ARC runners on **prod** |
        | `/status-runners-dev` | Check Flux & runner status on **dev** cluster |
        | `/status-runners-prod` | Check Flux & runner status on **prod** cluster |
        
        ### 📋 Typical Workflow
        
        1. `/set-aks-backend` → Initialize Terraform state storage
        2. `/build-aks-community` and `/build-aks-gh-supported` → Deploy both AKS clusters
        3. `/bootstrap-flux-dev` and `/bootstrap-flux-prod` → Setup GitOps on both clusters
        4. `/deploy-runners env=dev flavor=community types=dind`
        5. `/deploy-runners env=prod flavor=gh-supported types=dind,kubernetes-pvc,kubernetes-novolume`
        6. `/status-runners-dev` and `/status-runners-prod` → Verify everything is running
        
        ---

  - type: input
    id: organization_prefix
    attributes:
      label: Organization Prefix
      description: Short identifier for your organization (3-8 characters)
      placeholder: "acme"
    validations:
      required: true

  - type: dropdown
    id: location
    attributes:
      label: Azure Region
      description: Select the Azure region for deployment
      options:
        - eastus
        - eastus2
        - westus2
        - westus3
        - centralus
        - northeurope
        - westeurope
        - uksouth
        - canadacentral
        - australiaeast
        - southeastasia
    validations:
      required: true

  - type: input
    id: application_name
    attributes:
      label: Application Name
      description: Name of the application or workload
      placeholder: "platform"
    validations:
      required: true

  - type: input
    id: cost_center
    attributes:
      label: Cost Center
      description: Cost center for billing
      placeholder: "Engineering"
    validations:
      required: false

  - type: input
    id: owner
    attributes:
      label: Owner
      description: Owner email or team name
      placeholder: "platform-team@example.com"
    validations:
      required: false

  - type: textarea
    id: admin_groups
    attributes:
      label: Azure AD Admin Group Object IDs
      description: |
        List of Azure AD group object IDs for AKS cluster admin access (one per line).
        Leave empty if not using Azure AD integration.
      placeholder: |
        xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy
    validations:
      required: false

  - type: checkboxes
    id: environments
    attributes:
      label: Target Environments
      description: Which environments do you plan to deploy?
      options:
        - label: Development (dev-linux)
        - label: Production (prod-linux-windows)

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      description: Please confirm the following
      options:
        - label: I have reviewed the infrastructure configuration
          required: true
        - label: I understand this will create Azure resources that incur costs
          required: true
        - label: I have the necessary permissions to deploy to Azure
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        
        ### 📋 Deployment Steps
        
        1. **Submit this issue** to create the deployment request
        2. **Comment `/set-aks-backend`** to initialize the Terraform state backend
        3. **Wait for backend completion** (you'll see a success comment)
        4. **Comment `/build-aks-community`** and **`/build-aks-gh-supported`** to deploy both AKS clusters
        
        ### 📊 Tracking
        
        Check the **Actions** tab for workflow runs. Results will be posted as comments on this issue.
