# =============================================================================
# IssueOps: Set AKS Backend
# =============================================================================
# Triggered by commenting `/set-aks-backend` or `/set-aks-backend-<env>` 
# Creates the Terraform state backend (storage account + resource group)
# Checks if resources exist before creating.
#
# Commands:
#   /set-aks-backend      - Create shared backend for all environments
#   /set-aks-backend-dev  - Create backend specifically for dev
#   /set-aks-backend-prod - Create backend specifically for prod
#   /check-backend        - Check if backend exists without creating
# =============================================================================

name: "IssueOps: Set AKS Backend"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read
  id-token: write

env:
  BACKEND_PREFIX: "tfstate"

jobs:
  parse-command:
    name: Parse Command
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'aks')
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      environment: ${{ steps.parse.outputs.environment }}
      check_only: ${{ steps.parse.outputs.check_only }}
    steps:
      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          
          if [[ "$COMMENT" =~ ^/set-aks-backend-dev ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "check_only=false" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/set-aks-backend-prod ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "check_only=false" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/set-aks-backend ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=shared" >> $GITHUB_OUTPUT
            echo "check_only=false" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/check-backend ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=shared" >> $GITHUB_OUTPUT
            echo "check_only=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  set-backend:
    name: Set AKS Backend
    runs-on: ubuntu-latest
    needs: parse-command
    if: needs.parse-command.outputs.should_run == 'true'
    environment: ${{ needs.parse-command.outputs.environment != 'shared' && needs.parse-command.outputs.environment || '' }}
    
    steps:
      - name: Add reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Add processing comment
        uses: actions/github-script@v7
        with:
          script: |
            const checkOnly = '${{ needs.parse-command.outputs.check_only }}' === 'true';
            const env = '${{ needs.parse-command.outputs.environment }}';
            const action = checkOnly ? 'Checking' : 'Setting up';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔧 ${action} AKS Backend (${env})\n\n**Triggered by:** @${context.payload.comment.user.login}\n**Environment:** ${env}\n**Workflow Run:** [View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n⏳ ${action} Terraform backend infrastructure...`
            });

      - name: Checkout InfraCreator
        uses: actions/checkout@v4
        with:
          path: InfraCreator

      - name: Checkout Azure-Catalog
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Azure-Catalog
          path: Azure-Catalog
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse issue body for configuration
        id: parse-issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const body = issue.data.body;
            
            // Parse form fields from issue body
            const getField = (label) => {
              const regex = new RegExp(`### ${label}\\s*\\n\\s*([^\\n#]+)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            };
            
            const orgPrefix = getField('Organization Prefix') || 'acme';
            const location = getField('Azure Region') || 'eastus';
            const appName = getField('Application Name') || 'platform';
            const costCenter = getField('Cost Center') || '';
            const owner = getField('Owner') || '';
            
            core.setOutput('org_prefix', orgPrefix);
            core.setOutput('location', location);
            core.setOutput('app_name', appName);
            core.setOutput('cost_center', costCenter);
            core.setOutput('owner', owner);
            
            console.log(`Parsed config: org=${orgPrefix}, location=${location}, app=${appName}`);

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # =======================================================================
      # Check if backend resources already exist
      # =======================================================================
      - name: Check existing resources
        id: check-existing
        run: |
          ORG_PREFIX="${{ steps.parse-issue.outputs.org_prefix }}"
          LOCATION="${{ steps.parse-issue.outputs.location }}"
          ENV="${{ needs.parse-command.outputs.environment }}"
          
          # Construct expected resource names
          RG_NAME="rg-${ORG_PREFIX}-tfstate-${ENV}-${LOCATION}"
          # Storage account names must be lowercase, no hyphens, max 24 chars
          SA_NAME=$(echo "st${ORG_PREFIX}tfstate${ENV}" | tr '[:upper:]' '[:lower:]' | tr -d '-' | cut -c1-24)
          
          echo "rg_name=${RG_NAME}" >> $GITHUB_OUTPUT
          echo "sa_name=${SA_NAME}" >> $GITHUB_OUTPUT
          
          echo "🔍 Checking for existing resources..."
          echo "   Resource Group: ${RG_NAME}"
          echo "   Storage Account: ${SA_NAME}"
          
          # Check Resource Group
          RG_EXISTS="false"
          if az group show --name "$RG_NAME" &>/dev/null; then
            RG_EXISTS="true"
            echo "✅ Resource Group exists"
          else
            echo "❌ Resource Group does not exist"
          fi
          echo "rg_exists=${RG_EXISTS}" >> $GITHUB_OUTPUT
          
          # Check Storage Account
          SA_EXISTS="false"
          if az storage account show --name "$SA_NAME" --resource-group "$RG_NAME" &>/dev/null; then
            SA_EXISTS="true"
            echo "✅ Storage Account exists"
          else
            echo "❌ Storage Account does not exist"
          fi
          echo "sa_exists=${SA_EXISTS}" >> $GITHUB_OUTPUT
          
          # Check if state containers exist
          CONTAINERS_EXIST="false"
          if [ "$SA_EXISTS" == "true" ]; then
            if az storage container show --name "tfstate" --account-name "$SA_NAME" --auth-mode login &>/dev/null; then
              CONTAINERS_EXIST="true"
              echo "✅ State container exists"
            else
              echo "❌ State container does not exist"
            fi
          fi
          echo "containers_exist=${CONTAINERS_EXIST}" >> $GITHUB_OUTPUT
          
          # Determine if fully configured
          if [ "$RG_EXISTS" == "true" ] && [ "$SA_EXISTS" == "true" ] && [ "$CONTAINERS_EXIST" == "true" ]; then
            echo "all_exist=true" >> $GITHUB_OUTPUT
            echo ""
            echo "🎉 All backend resources already exist!"
          else
            echo "all_exist=false" >> $GITHUB_OUTPUT
            echo ""
            echo "📦 Some resources need to be created"
          fi

      - name: Post check-only results
        if: needs.parse-command.outputs.check_only == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const rgExists = '${{ steps.check-existing.outputs.rg_exists }}' === 'true';
            const saExists = '${{ steps.check-existing.outputs.sa_exists }}' === 'true';
            const containersExist = '${{ steps.check-existing.outputs.containers_exist }}' === 'true';
            const allExist = '${{ steps.check-existing.outputs.all_exist }}' === 'true';
            
            const status = (exists) => exists ? '✅ Exists' : '❌ Missing';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔍 Backend Status Check
            
            | Resource | Status |
            |----------|--------|
            | Resource Group | ${status(rgExists)} |
            | Storage Account | ${status(saExists)} |
            | State Containers | ${status(containersExist)} |
            
            **Resource Group:** \`${{ steps.check-existing.outputs.rg_name }}\`
            **Storage Account:** \`${{ steps.check-existing.outputs.sa_name }}\`
            
            ${allExist 
              ? '### ✅ Backend is fully configured!\n\nYou can proceed with `/build-aks-dev` or `/build-aks-prod`'
              : '### ⚠️ Backend needs setup\n\nRun `/set-aks-backend` to create missing resources'}
            
            ---
            ⏱️ Checked at: ${new Date().toISOString()}`
            });

      - name: Skip if check only
        if: needs.parse-command.outputs.check_only == 'true'
        run: |
          echo "Check-only mode, skipping creation"
          exit 0

      - name: Post using-existing comment
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ Backend Already Exists!
            
            **Resource Group:** \`${{ steps.check-existing.outputs.rg_name }}\`
            **Storage Account:** \`${{ steps.check-existing.outputs.sa_name }}\`
            **Container:** \`tfstate\`
            
            The backend is already configured. You can proceed with deploying:
            
            | Environment | Command |
            |-------------|---------|
            | Development | \`/build-aks-dev\` |
            | Production | \`/build-aks-prod\` |
            
            ---
            ⏱️ Checked at: ${new Date().toISOString()}`
            });

      - name: Save existing backend config
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist == 'true'
        run: |
          mkdir -p backend-config
          cat > backend-config/backend.json <<EOF
          {
            "resource_group_name": "${{ steps.check-existing.outputs.rg_name }}",
            "storage_account_name": "${{ steps.check-existing.outputs.sa_name }}",
            "container_name": "tfstate",
            "issue_number": "${{ github.event.issue.number }}",
            "environment": "${{ needs.parse-command.outputs.environment }}",
            "already_existed": true
          }
          EOF

      - name: Upload existing backend config
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-config-${{ github.event.issue.number }}
          path: backend-config/
          retention-days: 90

      - name: Skip terraform if all exist
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist == 'true'
        run: |
          echo "All resources exist, skipping Terraform"
          exit 0

      # =======================================================================
      # Create resources with Terraform (only if needed)
      # =======================================================================
      - name: Setup Terraform
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist != 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false

      - name: Create tfvars file
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist != 'true'
        working-directory: InfraCreator/AKS/backend
        run: |
          ENV="${{ needs.parse-command.outputs.environment }}"
          
          cat > terraform.tfvars <<EOF
          organization_prefix      = "${{ steps.parse-issue.outputs.org_prefix }}"
          application_name         = "tfstate"
          environment              = "${ENV}"
          location                 = "${{ steps.parse-issue.outputs.location }}"
          cost_center              = "${{ steps.parse-issue.outputs.cost_center }}"
          owner                    = "${{ steps.parse-issue.outputs.owner }}"
          storage_replication_type = "GRS"
          
          state_containers = {
            tfstate = {
              access_type = "private"
            }
            tfstate-dev = {
              access_type = "private"
            }
            tfstate-prod = {
              access_type = "private"
            }
          }
          
          additional_tags = {
            ManagedBy   = "IssueOps"
            IssueNumber = "${{ github.event.issue.number }}"
            Repository  = "${{ github.repository }}"
          }
          EOF

      - name: Terraform Init
        id: init
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist != 'true'
        working-directory: InfraCreator/AKS/backend
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Plan
        id: plan
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist != 'true'
        working-directory: InfraCreator/AKS/backend
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          head -100 plan_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Terraform Apply
        id: apply
        if: needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist != 'true'
        working-directory: InfraCreator/AKS/backend
        run: |
          terraform apply -auto-approve tfplan 2>&1 | tee apply_output.txt
          
          # Capture outputs
          echo "rg_name=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT
          echo "sa_name=$(terraform output -raw storage_account_name)" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true

      - name: Post success comment
        if: success() && needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ AKS Backend Created Successfully!
            
            **Resource Group:** \`${{ steps.apply.outputs.rg_name }}\`
            **Storage Account:** \`${{ steps.apply.outputs.sa_name }}\`
            **Container:** \`tfstate\`
            
            ### Backend Configuration Saved
            
            The backend is now ready. You can proceed with deploying the AKS infrastructure:
            
            | Environment | Command |
            |-------------|---------|
            | Development | \`/build-aks-dev\` |
            | Production | \`/build-aks-prod\` |
            
            ### 📋 Manual Backend Config (if needed)
            
            \`\`\`hcl
            backend "azurerm" {
              resource_group_name  = "${{ steps.apply.outputs.rg_name }}"
              storage_account_name = "${{ steps.apply.outputs.sa_name }}"
              container_name       = "tfstate"
              key                  = "aks-<env>.tfstate"
            }
            \`\`\`
            
            ---
            ⏱️ Completed at: ${new Date().toISOString()}`
            });

      - name: Save backend config as artifact
        if: success() && needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist != 'true'
        run: |
          mkdir -p backend-config
          cat > backend-config/backend.json <<EOF
          {
            "resource_group_name": "${{ steps.apply.outputs.rg_name }}",
            "storage_account_name": "${{ steps.apply.outputs.sa_name }}",
            "container_name": "tfstate",
            "issue_number": "${{ github.event.issue.number }}",
            "environment": "${{ needs.parse-command.outputs.environment }}",
            "created_new": true
          }
          EOF

      - name: Upload backend config
        if: success() && needs.parse-command.outputs.check_only != 'true' && steps.check-existing.outputs.all_exist != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-config-${{ github.event.issue.number }}
          path: backend-config/
          retention-days: 90

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Backend Setup Failed
            
            **Workflow Run:** [View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            Please check the workflow logs for more details.
            
            Common issues:
            - Missing Azure credentials (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID)
            - Insufficient permissions in Azure subscription
            - Azure-Catalog repository not accessible
            
            ---
            ⏱️ Failed at: ${new Date().toISOString()}`
            });
