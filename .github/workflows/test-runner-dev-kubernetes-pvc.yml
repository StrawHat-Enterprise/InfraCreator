name: "Test: Dev Runner Kubernetes PVC"

on:
  workflow_dispatch:

jobs:
  test-dev-kubernetes-pvc:
    name: Test Dev Kubernetes PVC Group
    runs-on: straw-hat-runners-linux-dev-kubernetes-pvc
    timeout-minutes: 15

    container:
      image: alpine:3.20

    steps:
      - name: Show runner info
        run: |
          echo "Runner Name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          uname -a

      - name: Validate child container execution
        run: |
          cat /etc/os-release

      - name: Test shared workspace write
        run: |
          mkdir -p "$GITHUB_WORKSPACE/pvc-check"
          echo "ok-from-kubernetes-pvc" > "$GITHUB_WORKSPACE/pvc-check/status.txt"
          cat "$GITHUB_WORKSPACE/pvc-check/status.txt"

      - name: Keep pod alive for PVC observation
        run: |
          echo "Sleeping for 180s so you can verify child pod + PVC in Kubernetes"
          sleep 180
