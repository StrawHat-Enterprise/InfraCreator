# =============================================================================
# Sample Workflow - ARC Runner Modes Validation
# =============================================================================
# Runs on all configured runner pools:
#   - community / dev / dind
#   - gh-supported / prod / dind
#   - gh-supported / prod / kubernetes-pvc
#   - gh-supported / prod / kubernetes-novolume
# =============================================================================

name: "Sample: ARC Runner Modes"

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to display'
        required: false
        default: 'Hello from self-hosted runner!'

jobs:
  community-dev-dind:
    name: Community Dev DinD
    runs-on: straw-hat-runners-linux-dev-dind

    steps:
      - name: Display runner info
        run: |
          echo "🚀 Running community dev dind runner"
          echo "Message: ${{ github.event.inputs.message }}"
          echo "Runner Name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          uname -a

      - name: Test Docker (DinD)
        run: |
          echo "Testing Docker-in-Docker..."
          docker run --rm hello-world
          echo "✅ Docker is working!"

  ghs-prod-dind:
    name: GH Supported Prod DinD
    runs-on: straw-hat-runners-linux-prod-dind

    steps:
      - name: Validate dind pool
        run: |
          echo "Runner: $RUNNER_NAME"
          docker --version
          docker run --rm alpine:3.20 echo "prod dind ok"

  ghs-prod-kubernetes-pvc:
    name: GH Supported Prod Kubernetes PVC
    runs-on: straw-hat-runners-linux-prod-kubernetes-pvc

    container:
      image: alpine:3.20

    steps:
      - name: Validate kubernetes PVC mode
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "container mode with PVC is working"
          touch /__w/_temp/pvc-mode.txt || true

  ghs-prod-kubernetes-novolume:
    name: GH Supported Prod Kubernetes NoVolume
    runs-on: straw-hat-runners-linux-prod-kubernetes-novolume

    container:
      image: alpine:3.20

    steps:
      - name: Validate kubernetes novolume mode
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "container mode without PVC is working"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: List repository files
        run: |
          ls -la
          ls -la .github/workflows/ || true
