# =============================================================================
# IssueOps: Bootstrap Flux & Deploy Action Runners (GitOps)
# =============================================================================
# Triggered by commenting on an AKS deployment issue (same issue as /build-aks)
#
# Supported commands:
#   /bootstrap-flux-dev   - Bootstrap Flux + push secrets to Key Vault (dev)
#   /bootstrap-flux-prod  - Bootstrap Flux + push secrets to Key Vault (prod)
#   /sync-runners-dev     - Force sync runner deployment via Flux (dev)
#   /sync-runners-prod    - Force sync runner deployment via Flux (prod)
#   /status-runners-dev   - Check runner status on dev cluster
#   /status-runners-prod  - Check runner status on prod cluster
#
# Architecture:
#   - actions-runner-gitops: GitOps repo with Flux Kustomizations
#   - actions-runner-helm: Helm charts published to GHCR
#   - Azure Key Vault: Stores GH_PAT for External Secrets Operator
# =============================================================================

name: "IssueOps: Bootstrap Flux & Action Runners (GitOps)"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  id-token: write
  actions: read

env:
  GITOPS_REPO: "actions-runner-gitops"
  HELM_REPO: "actions-runner-helm"
  RUNNER_GROUP: "straw-hat-runners-linux"

jobs:
  parse-command:
    name: Parse Command
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'aks')
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      environment: ${{ steps.parse.outputs.environment }}
      action: ${{ steps.parse.outputs.action }}
    steps:
      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          
          # Bootstrap Flux commands
          if [[ "$COMMENT" =~ ^/bootstrap-flux-dev ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "action=bootstrap-flux" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/bootstrap-flux-prod ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "action=bootstrap-flux" >> $GITHUB_OUTPUT
          # Sync runners commands (via GitOps)
          elif [[ "$COMMENT" =~ ^/sync-runners-dev ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "action=sync-runners" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/sync-runners-prod ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "action=sync-runners" >> $GITHUB_OUTPUT
          # Status commands
          elif [[ "$COMMENT" =~ ^/status-runners-dev ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "action=status" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/status-runners-prod ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "action=status" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  bootstrap-runners:
    name: Bootstrap (${{ needs.parse-command.outputs.environment }}) - ${{ needs.parse-command.outputs.action }}
    runs-on: ubuntu-latest
    needs: parse-command
    if: needs.parse-command.outputs.should_run == 'true'
    environment: ${{ needs.parse-command.outputs.environment }}
    
    steps:
      - name: Add reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Add processing comment
        uses: actions/github-script@v7
        with:
          script: |
            const action = '${{ needs.parse-command.outputs.action }}';
            const env = '${{ needs.parse-command.outputs.environment }}';
            
            let emoji, actionText;
            switch(action) {
              case 'bootstrap-flux':
                emoji = '🔄';
                actionText = 'Bootstrapping Flux + Pushing Secrets to Key Vault';
                break;
              case 'sync-runners':
                emoji = '🔃';
                actionText = 'Syncing Runners via GitOps';
                break;
              case 'status':
                emoji = '📊';
                actionText = 'Checking Runner Status';
                break;
              default:
                emoji = '⚙️';
                actionText = 'Processing';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ${emoji} ${actionText} (${env})
            
            **Triggered by:** @${context.payload.comment.user.login}
            **Environment:** ${env}
            **Action:** ${action}
            **Workflow Run:** [View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            ### GitOps Architecture
            - 📦 **Helm Charts:** \`${{ env.HELM_REPO }}\` → GHCR
            - 🔄 **GitOps Repo:** \`${{ env.GITOPS_REPO }}\`
            - 🔐 **Secrets:** Azure Key Vault → ESO → Cluster
            - 🏃 **Runner Group:** \`${{ env.RUNNER_GROUP }}\`
            
            ⏳ ${actionText}...`
            });

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse issue body for configuration
        id: parse-issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const body = issue.data.body;
            
            const getField = (label) => {
              const regex = new RegExp(`### ${label}\\s*\\n\\s*([^\\n#]+)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            };
            
            const orgPrefix = getField('Organization Prefix') || 'acme';
            const location = getField('Azure Region') || 'eastus';
            const appName = getField('Application Name') || 'platform';
            
            core.setOutput('org_prefix', orgPrefix);
            core.setOutput('location', location);
            core.setOutput('app_name', appName);

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials and Key Vault info
        id: aks-creds
        run: |
          ORG_PREFIX="${{ steps.parse-issue.outputs.org_prefix }}"
          APP_NAME="${{ steps.parse-issue.outputs.app_name }}"
          LOCATION="${{ steps.parse-issue.outputs.location }}"
          ENV="${{ needs.parse-command.outputs.environment }}"
          
          # Convert location to short code (matching Azure-Catalog naming module)
          declare -A LOCATION_SHORT=(
            ["eastus"]="eus" ["eastus2"]="eus2" ["westus"]="wus" ["westus2"]="wus2"
            ["westus3"]="wus3" ["centralus"]="cus" ["northcentralus"]="ncus"
            ["southcentralus"]="scus" ["westcentralus"]="wcus" ["canadacentral"]="cac"
            ["canadaeast"]="cae" ["brazilsouth"]="brs" ["northeurope"]="neu"
            ["westeurope"]="weu" ["uksouth"]="uks" ["ukwest"]="ukw"
          )
          LOCATION_CODE="${LOCATION_SHORT[$LOCATION]:-${LOCATION:0:4}}"
          
          # Convert environment to short code
          declare -A ENV_SHORT=(
            ["development"]="dev" ["dev"]="dev" ["staging"]="stg" ["stg"]="stg"
            ["production"]="prd" ["prod"]="prd" ["prd"]="prd" ["test"]="tst"
          )
          ENV_CODE="${ENV_SHORT[$ENV]:-$ENV}"
          
          # Clean prefix and app name (remove dashes and special chars)
          PREFIX_CLEAN=$(echo "$ORG_PREFIX" | tr -d '-_' | tr '[:upper:]' '[:lower:]')
          APP_NAME_CLEAN=$(echo "$APP_NAME" | tr -d '-_' | tr '[:upper:]' '[:lower:]')
          
          # Naming pattern: {prefix}-{app}-{location_short}-{env_short}-{type}
          BASE_NAME="${ORG_PREFIX}-${APP_NAME}-${LOCATION_CODE}-${ENV_CODE}"
          BASE_NAME_NO_DASH="${PREFIX_CLEAN}${APP_NAME_CLEAN}${LOCATION_CODE}${ENV_CODE}"
          RG_NAME="${BASE_NAME}-rg"
          AKS_NAME="${BASE_NAME}-aks"
          
          # Key Vault uses key_vault_short: {base_no_dash}kv{unique_suffix} truncated to 24 chars
          # unique_suffix = first 4 chars of md5 hash
          UNIQUE_SUFFIX=$(echo -n "${ORG_PREFIX}${APP_NAME}${ENV}${LOCATION}" | md5sum | cut -c1-4)
          KV_NAME=$(echo "${BASE_NAME_NO_DASH}kv${UNIQUE_SUFFIX}" | cut -c1-24)
          
          echo "🔧 Using naming pattern: ${BASE_NAME}-*"
          echo "🔐 Key Vault (short): ${KV_NAME}"
          echo "rg_name=${RG_NAME}" >> $GITHUB_OUTPUT
          echo "aks_name=${AKS_NAME}" >> $GITHUB_OUTPUT
          echo "kv_name=${KV_NAME}" >> $GITHUB_OUTPUT
          
          echo "🔑 Getting AKS credentials..."
          az aks get-credentials \
            --resource-group "$RG_NAME" \
            --name "$AKS_NAME" \
            --overwrite-existing
          
          # Get AKS OIDC Issuer URL for workload identity
          OIDC_ISSUER=$(az aks show \
            --resource-group "$RG_NAME" \
            --name "$AKS_NAME" \
            --query "oidcIssuerProfile.issuerUrl" -o tsv)
          echo "oidc_issuer=${OIDC_ISSUER}" >> $GITHUB_OUTPUT
          
          # Get Managed Identity Client ID (created by Terraform)
          MI_NAME="${BASE_NAME}-id"
          MI_CLIENT_ID=$(az identity show \
            --resource-group "$RG_NAME" \
            --name "$MI_NAME" \
            --query "clientId" -o tsv 2>/dev/null || echo "")
          echo "mi_client_id=${MI_CLIENT_ID}" >> $GITHUB_OUTPUT
          
          echo "✅ Connected to cluster: ${AKS_NAME}"
          echo "🔐 Key Vault: ${KV_NAME}"
          echo "🆔 Managed Identity: ${MI_CLIENT_ID}"

      # =====================================================================
      # FLUX BOOTSTRAP + KEY VAULT SECRETS
      # =====================================================================
      - name: Install Flux CLI
        if: needs.parse-command.outputs.action == 'bootstrap-flux'
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash
          flux --version

      - name: Push secrets to Azure Key Vault
        if: needs.parse-command.outputs.action == 'bootstrap-flux'
        run: |
          KV_NAME="${{ steps.aks-creds.outputs.kv_name }}"
          
          echo "🔐 Pushing secrets to Azure Key Vault: ${KV_NAME}"
          
          # Push GitHub PAT to Key Vault (for ESO to sync)
          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name "github-pat" \
            --value "${{ secrets.GH_PAT }}" \
            --output none
          
          echo "✅ Secret 'github-pat' pushed to Key Vault"
          
          # Optionally push other secrets (ACR credentials, etc.)
          # az keyvault secret set \
          #   --vault-name "$KV_NAME" \
          #   --name "acr-password" \
          #   --value "${{ secrets.ACR_PASSWORD }}" \
          #   --output none

      - name: Setup Workload Identity Federation
        if: needs.parse-command.outputs.action == 'bootstrap-flux'
        run: |
          RG_NAME="${{ steps.aks-creds.outputs.rg_name }}"
          MI_CLIENT_ID="${{ steps.aks-creds.outputs.mi_client_id }}"
          OIDC_ISSUER="${{ steps.aks-creds.outputs.oidc_issuer }}"
          ORG_PREFIX="${{ steps.parse-issue.outputs.org_prefix }}"
          APP_NAME="${{ steps.parse-issue.outputs.app_name }}"
          LOCATION="${{ steps.parse-issue.outputs.location }}"
          ENV="${{ needs.parse-command.outputs.environment }}"
          
          MI_NAME="id-${ORG_PREFIX}-${APP_NAME}-${ENV}-${LOCATION}"
          
          if [[ -n "$MI_CLIENT_ID" && -n "$OIDC_ISSUER" ]]; then
            echo "🔗 Setting up Workload Identity Federation..."
            
            # Create federated credential for external-secrets SA
            az identity federated-credential create \
              --name "fedcred-external-secrets" \
              --identity-name "$MI_NAME" \
              --resource-group "$RG_NAME" \
              --issuer "$OIDC_ISSUER" \
              --subject "system:serviceaccount:external-secrets:external-secrets-sa" \
              --audiences "api://AzureADTokenExchange" \
              2>/dev/null || echo "Federated credential may already exist"
            
            echo "✅ Workload Identity Federation configured"
          else
            echo "⚠️ Skipping Workload Identity setup - missing MI or OIDC issuer"
          fi

      - name: Bootstrap Flux with GitOps repo
        if: needs.parse-command.outputs.action == 'bootstrap-flux'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ENV="${{ needs.parse-command.outputs.environment }}"
          CLUSTER_PATH="clusters/aks-${ENV}"
          
          echo "🔄 Bootstrapping Flux..."
          echo "   Owner: ${{ github.repository_owner }}"
          echo "   Repository: ${{ env.GITOPS_REPO }}"
          echo "   Path: ${CLUSTER_PATH}"
          
          flux bootstrap github \
            --owner="${{ github.repository_owner }}" \
            --repository="${{ env.GITOPS_REPO }}" \
            --branch="main" \
            --path="${CLUSTER_PATH}" \
            --personal=false \
            --components-extra=image-reflector-controller,image-automation-controller \
            || echo "Flux bootstrap completed (may already exist)"

      - name: Apply cluster-specific configuration
        if: needs.parse-command.outputs.action == 'bootstrap-flux'
        run: |
          ENV="${{ needs.parse-command.outputs.environment }}"
          KV_NAME="${{ steps.aks-creds.outputs.kv_name }}"
          MI_CLIENT_ID="${{ steps.aks-creds.outputs.mi_client_id }}"
          
          echo "📝 Creating Flux substitution ConfigMap..."
          
          # Create ConfigMap for Flux variable substitution
          kubectl create configmap cluster-config \
            --namespace=flux-system \
            --from-literal=KEYVAULT_URL="https://${KV_NAME}.vault.azure.net" \
            --from-literal=AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
            --from-literal=MANAGED_IDENTITY_CLIENT_ID="${MI_CLIENT_ID}" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✅ Cluster configuration applied"

      - name: Verify Flux installation
        if: needs.parse-command.outputs.action == 'bootstrap-flux'
        run: |
          echo "🔍 Verifying Flux installation..."
          flux check
          
          echo ""
          echo "📦 Flux components:"
          kubectl get pods -n flux-system
          
          echo ""
          echo "📋 Flux Kustomizations:"
          kubectl get kustomizations -n flux-system

      # =====================================================================
      # SYNC RUNNERS (via GitOps)
      # =====================================================================
      - name: Install Flux CLI
        if: needs.parse-command.outputs.action == 'sync-runners'
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash
          flux --version

      - name: Force reconcile GitOps
        if: needs.parse-command.outputs.action == 'sync-runners'
        run: |
          echo "🔃 Force reconciling Flux resources..."
          
          # Reconcile GitRepository
          flux reconcile source git flux-system
          
          # Reconcile Kustomizations
          flux reconcile kustomization infrastructure-sources || true
          flux reconcile kustomization infrastructure-controllers || true
          flux reconcile kustomization apps-runners || true
          
          echo ""
          echo "📋 Current Kustomization status:"
          kubectl get kustomizations -n flux-system
          
          echo ""
          echo "📦 HelmRelease status:"
          kubectl get helmreleases -A

      # =====================================================================
      # STATUS CHECK
      # =====================================================================
      - name: Install Flux CLI
        if: needs.parse-command.outputs.action == 'status'
        run: |
          curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Check runner status
        if: needs.parse-command.outputs.action == 'status'
        id: status
        run: |
          echo "📊 Checking runner status..."
          
          # Check Flux status
          echo "### Flux Status" >> status.md
          if kubectl get ns flux-system &>/dev/null; then
            echo "✅ Flux is installed" >> status.md
            echo '```' >> status.md
            flux check >> status.md 2>&1 || true
            echo '```' >> status.md
            
            echo "" >> status.md
            echo "#### Kustomizations" >> status.md
            echo '```' >> status.md
            kubectl get kustomizations -n flux-system >> status.md 2>&1 || true
            echo '```' >> status.md
            
            echo "" >> status.md
            echo "#### HelmReleases" >> status.md
            echo '```' >> status.md
            kubectl get helmreleases -A >> status.md 2>&1 || true
            echo '```' >> status.md
          else
            echo "❌ Flux is not installed" >> status.md
          fi
          
          echo "" >> status.md
          
          # Check External Secrets
          echo "### External Secrets Status" >> status.md
          if kubectl get ns external-secrets &>/dev/null; then
            echo "✅ External Secrets Operator installed" >> status.md
            echo '```' >> status.md
            kubectl get pods -n external-secrets >> status.md 2>&1 || true
            echo '```' >> status.md
            
            echo "" >> status.md
            echo "#### ClusterSecretStores" >> status.md
            echo '```' >> status.md
            kubectl get clustersecretstores >> status.md 2>&1 || true
            echo '```' >> status.md
            
            echo "" >> status.md
            echo "#### ExternalSecrets" >> status.md
            echo '```' >> status.md
            kubectl get externalsecrets -A >> status.md 2>&1 || true
            echo '```' >> status.md
          else
            echo "❌ External Secrets Operator not installed" >> status.md
          fi
          
          echo "" >> status.md
          
          # Check ARC Controller
          echo "### ARC Controller Status" >> status.md
          if kubectl get ns arc-systems &>/dev/null; then
            echo "✅ ARC Controller namespace exists" >> status.md
            echo '```' >> status.md
            kubectl get pods -n arc-systems >> status.md 2>&1 || true
            echo '```' >> status.md
          else
            echo "❌ ARC Controller not installed" >> status.md
          fi
          
          echo "" >> status.md
          
          # Check Runners
          echo "### Action Runners Status" >> status.md
          if kubectl get ns arc-runners &>/dev/null; then
            echo "✅ Runner namespace exists" >> status.md
            echo '```' >> status.md
            kubectl get pods -n arc-runners >> status.md 2>&1 || true
            echo '```' >> status.md
            
            echo "" >> status.md
            echo "#### Helm Releases" >> status.md
            echo '```' >> status.md
            helm list -n arc-systems >> status.md 2>&1 || true
            helm list -n arc-runners >> status.md 2>&1 || true
            echo '```' >> status.md
          else
            echo "❌ Runners not installed" >> status.md
          fi
          
          cat status.md
          echo "status_content<<EOF" >> $GITHUB_OUTPUT
          cat status.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # =====================================================================
      # POST RESULTS
      # =====================================================================
      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const action = '${{ needs.parse-command.outputs.action }}';
            const env = '${{ needs.parse-command.outputs.environment }}';
            const aksName = '${{ steps.aks-creds.outputs.aks_name }}';
            const kvName = '${{ steps.aks-creds.outputs.kv_name }}';
            const gitopsRepo = '${{ env.GITOPS_REPO }}';
            const helmRepo = '${{ env.HELM_REPO }}';
            const runnerGroup = '${{ env.RUNNER_GROUP }}';
            
            let emoji, title, content;
            
            switch(action) {
              case 'bootstrap-flux':
                emoji = '✅';
                title = 'Flux Bootstrap + Key Vault Secrets Complete';
                content = `
            **Cluster:** \`${aksName}\`
            **GitOps Repo:** \`${{ github.repository_owner }}/${gitopsRepo}\`
            **Helm Charts:** \`${{ github.repository_owner }}/${helmRepo}\` → GHCR
            **Key Vault:** \`${kvName}\`
            **Path:** \`clusters/aks-${env}\`
            
            ### What was configured:
            1. ✅ Flux bootstrapped with GitOps repo
            2. ✅ GitHub PAT pushed to Azure Key Vault (\`github-pat\`)
            3. ✅ Workload Identity Federation for ESO
            4. ✅ Cluster config ConfigMap created
            
            ### GitOps Flow:
            \`\`\`
            GitOps Repo → Flux → HelmReleases → GHCR Charts → Cluster
                                      ↓
                          ExternalSecrets → Key Vault → Secrets
            \`\`\`
            
            ### Next Steps
            1. Flux will automatically deploy cert-manager, ESO, and ARC
            2. ESO will sync \`github-pat\` from Key Vault to cluster
            3. ARC will register runners with group: \`${runnerGroup}\`
            4. Check status: \`/status-runners-${env}\`
            5. Force sync: \`/sync-runners-${env}\`
            `;
                break;
              
              case 'sync-runners':
                emoji = '✅';
                title = 'GitOps Sync Complete';
                content = `
            **Cluster:** \`${aksName}\`
            
            All Flux Kustomizations have been reconciled.
            
            ### Commands
            - Check status: \`/status-runners-${env}\`
            `;
                break;
              
              case 'status':
                emoji = '📊';
                title = 'Runner Status Report';
                content = `${{ steps.status.outputs.status_content }}`;
                break;
              
              default:
                emoji = '✅';
                title = 'Action Complete';
                content = 'Operation completed successfully.';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ${emoji} ${title} (${env})
            
            ${content}
            
            ---
            ⏱️ Completed at: ${new Date().toISOString()}`
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const action = '${{ needs.parse-command.outputs.action }}';
            const env = '${{ needs.parse-command.outputs.environment }}';
            const gitopsRepo = '${{ env.GITOPS_REPO }}';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ ${action} Failed (${env})
            
            The operation encountered an error.
            
            **Workflow Run:** [View Logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            ### Troubleshooting
            1. Ensure AKS cluster exists: \`/check-aks-${env}\`
            2. Check that \`GH_PAT\` secret is configured with scopes: repo, admin:org, workflow
            3. Ensure Key Vault exists and Service Principal has access
            4. Verify GitOps repo exists: \`${{ github.repository_owner }}/${gitopsRepo}\`
            5. Check Managed Identity has Key Vault Secrets User role
            
            ### Required Secrets
            - \`AZURE_CLIENT_ID\` - Service Principal/Managed Identity Client ID
            - \`AZURE_TENANT_ID\` - Azure AD Tenant ID
            - \`AZURE_SUBSCRIPTION_ID\` - Azure Subscription ID
            - \`GH_PAT\` - GitHub PAT with repo, admin:org, workflow scopes
            
            ---
            ⏱️ Failed at: ${new Date().toISOString()}`
            });
